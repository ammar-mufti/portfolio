<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin</title>
  <style>
    .cms-warning-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 99999;
      background: #1A1A2E;
      color: #fff;
      font-family: sans-serif;
      font-size: 13px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .cms-warning-banner .warn-icon {
      background: #F59E0B;
      color: #1A1A2E;
      font-weight: 700;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
    }
    .cms-warning-banner .warn-text {
      color: #E5E7EB;
    }
    .cms-warning-banner .warn-text strong {
      color: #F59E0B;
    }
    .cms-warning-banner .warn-dismiss {
      margin-left: 16px;
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      border-radius: 4px;
      padding: 2px 10px;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .cms-warning-banner .warn-dismiss:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="cms-warning-banner" id="cmsBanner">
    <span class="warn-icon">!</span>
    <span class="warn-text">
      <strong>Warning:</strong> In the Workflow tab, <strong>"Delete entry" permanently deletes the project</strong> — it does NOT just cancel the draft. To discard a draft safely, open the item and click <strong>"Delete unpublished changes"</strong> instead.
    </span>
    <button class="warn-dismiss" onclick="document.getElementById('cmsBanner').style.display='none'">Got it</button>
  </div>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
</body>
</html>
