<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin</title>
  <style>
    .cms-confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 999999;
      align-items: center;
      justify-content: center;
    }
    .cms-confirm-overlay.active { display: flex; }
    .cms-confirm-box {
      background: #fff;
      border-radius: 10px;
      padding: 32px 28px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      font-family: sans-serif;
      text-align: center;
    }
    .cms-confirm-box .confirm-icon {
      width: 48px;
      height: 48px;
      background: #FEF3C7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 22px;
    }
    .cms-confirm-box h3 {
      font-size: 18px;
      font-weight: 700;
      color: #1A1A2E;
      margin-bottom: 10px;
    }
    .cms-confirm-box p {
      font-size: 14px;
      color: #6B7280;
      margin-bottom: 8px;
      line-height: 1.55;
    }
    .cms-confirm-box .confirm-note {
      font-size: 13px;
      color: #F59E0B;
      font-weight: 600;
      background: #FEF3C7;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 24px;
    }
    .cms-confirm-actions { display: flex; gap: 12px; justify-content: center; }
    .cms-confirm-actions button {
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-cancel-delete { background: #F3F4F6; color: #1A1A2E; }
    .btn-cancel-delete:hover { background: #E5E7EB; }
    .btn-confirm-delete { background: #DC2626; color: #fff; }
    .btn-confirm-delete:hover { background: #B91C1C; }

    #nc-root { margin-top: 36px !important; }
    #sveltia-cms { margin-top: 36px !important; }
    [class*="AppHeader"] { top: 36px !important; }
    [class*="app-header"] { top: 36px !important; }
    [class*="toolbar"] { top: 36px !important; }
    [class*="Header"] { top: 36px !important; }
    [role="banner"] { top: 36px !important; position: sticky !important; }
  </style>
</head>
<body>

  <div class="cms-confirm-overlay" id="deleteConfirmOverlay">
    <div class="cms-confirm-box">
      <div class="confirm-icon">⚠️</div>
      <h3>Permanently Delete Entry?</h3>
      <p>You are about to permanently delete this entry from your portfolio. This action <strong>cannot be undone</strong>.</p>
      <div class="confirm-note">
        💡 To cancel unpublished changes only, click "Cancel" and use "Delete unpublished changes" inside the entry instead.
      </div>
      <div class="cms-confirm-actions">
        <button class="btn-cancel-delete" id="cancelDeleteBtn">Cancel — Keep Entry</button>
        <button class="btn-confirm-delete" id="confirmDeleteBtn">Yes, Delete Permanently</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

  <script>
    let pendingDeleteBtn = null;

    function interceptDeleteButtons() {
      const allButtons = document.querySelectorAll('button');
      allButtons.forEach(btn => {
        const text = btn.textContent.trim().toLowerCase();
        if (
          (text === 'delete entry' || text === 'delete published entry' || text === 'delete') &&
          !btn.dataset.intercepted
        ) {
          btn.dataset.intercepted = 'true';
          btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            pendingDeleteBtn = btn;
            document.getElementById('deleteConfirmOverlay').classList.add('active');
          }, true);
        }
      });
    }

    document.getElementById('cancelDeleteBtn').addEventListener('click', function() {
      document.getElementById('deleteConfirmOverlay').classList.remove('active');
      pendingDeleteBtn = null;
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
      document.getElementById('deleteConfirmOverlay').classList.remove('active');
      if (pendingDeleteBtn) {
        pendingDeleteBtn.dataset.intercepted = 'false';
        pendingDeleteBtn.click();
        pendingDeleteBtn = null;
      }
    });

    const observer = new MutationObserver(function() {
      interceptDeleteButtons();
    });
    observer.observe(document.body, { childList: true, subtree: true });
    setTimeout(interceptDeleteButtons, 2000);
    setTimeout(interceptDeleteButtons, 4000);
  </script>

</body>
</html>
