backend:
  name: github
  repo: ammar-mufti/portfolio
  branch: main
  base_url: https://cms-auth.muftiammar52.workers.dev


media_folder: "projects"
public_folder: "projects"

collections:
  - name: "hero"
    label: "Hero Section"
    files:
      - label: "Hero Content"
        name: "hero"
        file: "data/hero.json"
        fields:
          - { label: "Full Name", name: "name", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "One Liner", name: "oneliner", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
          - label: "Resume PDF"
            name: "resume_filename"
            widget: "file"
            media_folder: "/"
            public_folder: "/"
            accept: ".pdf"
            hint: "Upload your resume PDF here. File will be saved to the root folder."
          - label: "Profile Photo"
            name: "photo"
            widget: "image"
            media_folder: "/"
            public_folder: "/"
            hint: "Upload your profile photo here. File will be saved to the root folder."
          - { label: "Browser Tab Title", name: "tab_title", widget: "string", hint: "This is what appears on the browser tab when someone visits your site." }

  - name: "about"
    label: "About Me"
    files:
      - label: "About Content"
        name: "about"
        file: "data/about.json"
        fields:
          - { label: "Summary Paragraph", name: "summary", widget: "text" }
          - { label: "Second Paragraph", name: "summary2", widget: "text" }
          - label: "Core Skills"
            name: "core_skills"
            widget: "list"
            field: { label: "Skill", name: "skill", widget: "string" }
          - label: "Tools & Systems"
            name: "tools"
            widget: "list"
            field: { label: "Tool", name: "tool", widget: "string" }

  - name: "experience"
    label: "Experience"
    files:
      - label: "Experience Content"
        name: "experience"
        file: "data/experience.json"
        fields:
          - label: "Roles"
            name: "roles"
            widget: "list"
            fields:
              - { label: "Job Title", name: "title", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Period", name: "period", widget: "string" }
              - label: "Bullets"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "bullet", widget: "string" }

  - name: "projects"
    label: "Proof of Work"
    folder: "data/projects"
    create: true
    delete: true
    identifier_field: "title"
    summary: "{{title}} — {{date}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "PDF File", name: "file", widget: "file", media_folder: "/projects", public_folder: "projects", accept: [".pdf"], hint: "⚠️ PDF files only. Other formats will be rejected." }
      - { label: "Visible on site", name: "visible", widget: "boolean", default: true, hint: "Uncheck to hide this project without deleting it" }
      - { label: "Date Added/Updated", name: "date", widget: "datetime", default: "", date_format: "DD MMM YYYY", time_format: false, hint: "Set the date this project was added or last updated." }

  - name: "education"
    label: "Education & Certifications"
    files:
      - label: "Education Content"
        name: "education"
        file: "data/education.json"
        fields:
          - { label: "Degree", name: "degree", widget: "string" }
          - { label: "University", name: "university", widget: "string" }
          - { label: "Period", name: "period", widget: "string", required: false }
          - label: "Certifications"
            name: "certifications"
            widget: "list"
            fields:
              - { label: "Certificate Name", name: "name", widget: "string" }
              - { label: "Issuer", name: "issuer", widget: "string" }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Proof of Work Section"
        name: "pow_settings"
        file: "data/pow_settings.json"
        fields:
          - { label: "Show Section Notice", name: "show_notice", widget: "boolean", default: true, hint: "Toggle to show or hide the notice below the proof of work cards" }
          - { label: "Section Notice", name: "notice", widget: "text", required: false, hint: "Text shown below the proof of work cards. Leave blank to hide.", default: "All documents are redacted delivery artefacts. Contact me to discuss any project in detail." }

  - name: "sections"
    label: "Section Visibility"
    files:
      - label: "Show/Hide Sections"
        name: "sections"
        file: "data/sections.json"
        fields:
          - { label: "Show Hero Section", name: "hero", widget: "boolean", default: true }
          - { label: "Show About Me Section", name: "about", widget: "boolean", default: true }
          - { label: "Show Experience Section", name: "experience", widget: "boolean", default: true }
          - { label: "Show Proof of Work Section", name: "work", widget: "boolean", default: true }
          - { label: "Show Education & Certifications Section", name: "education", widget: "boolean", default: true }

  - name: "seo"
    label: "SEO Settings"
    files:
      - label: "SEO and Social Sharing"
        name: "seo"
        file: "data/seo.json"
        fields:
          - { label: "Page Title", name: "title", widget: "string", hint: "Shown in browser tab and search results. Keep under 60 characters." }
          - { label: "Meta Description", name: "description", widget: "text", hint: "Shown in Google search results. Keep under 160 characters." }
          - { label: "Open Graph Title", name: "og_title", widget: "string", hint: "Title shown when link is shared on LinkedIn; WhatsApp; Facebook." }
          - { label: "Open Graph Description", name: "og_description", widget: "text", hint: "Description shown when link is shared on LinkedIn; WhatsApp; Facebook." }
          - { label: "Keywords", name: "keywords", widget: "string", hint: "Comma separated keywords for search engines." }
