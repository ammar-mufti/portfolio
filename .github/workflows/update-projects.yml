name: Update Projects Manifest

on:
  push:
    paths:
      - 'data/projects/**.md'

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate projects.json from markdown files
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const dir = 'data/projects';
          if (!fs.existsSync(dir)) {
            fs.writeFileSync('data/projects.json', JSON.stringify({ projects: [] }, null, 2));
            process.exit(0);
          }

          const files = fs.readdirSync(dir).filter(f => f.endsWith('.md'));

          const projects = files.map(filename => {
            try {
              const content = fs.readFileSync(path.join(dir, filename), 'utf8');
              const match = content.match(/^---\n([\s\S]*?)\n---/);
              if (!match) return null;

              const fm = match[1];
              const title = (fm.match(/^title:\s*(.+)$/m) || [])[1]?.trim().replace(/^['\"]|['\"]$/g, '');
              const description = (fm.match(/^description:\s*([\s\S]*?)(?=\n\w|\n---|\$)/m) || [])[1]?.trim().replace(/^['\"]|['\"]$/g, '');
              const file = (fm.match(/^file:\s*(.+)$/m) || [])[1]?.trim().replace(/^['\"]|['\"]$/g, '');
              const visible = (fm.match(/^visible:\s*(.+)$/m) || [])[1]?.trim() !== 'false';

              const tagsMatch = fm.match(/^tags:\s*\n((?:[ \t]*-[ \t]*.+\n?)*)/m);
              const tags = tagsMatch
                ? (tagsMatch[1].match(/^[ \t]*-[ \t]*(.+)$/gm) || []).map(t => t.replace(/^[ \t]*-[ \t]*/, '').trim())
                : [];

              if (!title) return null;
              return { title, description, tags, file, visible };
            } catch(e) {
              console.error('Error parsing ' + filename + ':', e.message);
              return null;
            }
          }).filter(Boolean);

          fs.writeFileSync('data/projects.json', JSON.stringify({ projects }, null, 2));
          console.log('Generated projects.json with ' + projects.length + ' projects');
          "

      - name: Commit updated projects.json
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/projects.json
          git diff --staged --quiet || git commit -m "Auto-update projects.json from markdown files [skip ci]"
          git push origin main
